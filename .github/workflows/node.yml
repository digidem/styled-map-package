name: Node.js Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changeset-check:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for accidental versioning
        run: |
          CHANGELOG_CHANGES=$(git diff --name-only origin/main...HEAD -- '**/CHANGELOG.md')
          if [ -n "$CHANGELOG_CHANGES" ]; then
            echo "::error::CHANGELOG.md files were modified. Do not run 'npx changeset version' on feature branches — version bumping is handled automatically by the Version Packages PR."
            exit 1
          fi

      - name: Check for changesets
        run: npx changeset status --since=origin/main

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, 22.x, 24.x]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: |
          echo "PLAYWRIGHT_VERSION=$(npx playwright --version)" >> $GITHUB_OUTPUT

      - name: Set Playwright cache path
        id: playwright-cache-path
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            echo "path=$USERPROFILE\\AppData\\Local\\ms-playwright" >> $GITHUB_OUTPUT
          elif [ "${{ runner.os }}" == "macOS" ]; then
            echo "path=~/Library/Caches/ms-playwright" >> $GITHUB_OUTPUT
          else
            echo "path=~/.cache/ms-playwright" >> $GITHUB_OUTPUT
          fi

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.playwright-cache-path.outputs.path }}
          key: ${{ runner.os }}-playwright-all-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright webkit (macOS only)
        if: runner.os == 'macOS' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps webkit

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Upload Playwright cache
        if: always() && steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.playwright-cache-path.outputs.path }}
          key: ${{ steps.playwright-cache.outputs.cache-primary-key }}
